# config.yaml — committed. Holds NON-SECRET config only.
# The Mongo connection string lives in .env (gitignored) as MONGODB_URI.

mongo:
  # Name of the env var holding the connection string (read from .env / environment).
  uri_env_var: MONGODB_URI
  # Data database to read from. NOTE: this differs from the auth database
  # (authSource=virtuals-games in the URI); auth happens against virtuals-games,
  # data is read from booktestdbgp_test.
  database: booktestdbgp_test

# Collection names. Some are UNVERIFIED until Phase 1 (Notebook 01) confirms them
# against the live DB — names below are best-guess from CLAUDE.md and will be
# corrected at REPORT-BACK GATE 1.
collections:
  players: players                 # canonical key = _id (-> player_key); 59 docs
  bets: bet_transactions           # one doc per bet ticket; loginId = phone; 330 docs
  # Money is SPLIT across two collections (not one with a transactionType field,
  # as CLAUDE.md guessed). Confirmed to exist in Phase 0; schema verified in Phase 1.
  deposits: deposittransactions    # 124 docs
  withdrawals: withdrawaltransactions  # 74 docs
  activity: useractivitylogs       # playerId = phone; ip_address is an XFF array; 3,461 docs
  bonus: bonustransactions         # lifecycle bonus ledger
  logins: loginlogs                # device fingerprint login ledger
  registration_otps: playerresgistrationotps  # pre-registration phone evidence
  walletaccounts: walletaccounts
  cashaccounts: cashaccounts
  # Other money-ish collections seen (clarify roles in Phase 1):
  #   gateway-payment-transactions (369), payouttransactions (137),
  #   bonustransactions (56), betting-tax-transactions (306), wht-transactions (131)

flatten:
  # Currencies are preserved per table. Do not compare/sum across these groups.
  currencies:
    bets: UGX
    money: UGX

  withdrawals:
    status_order:
      initiated: 1
      pending: 2
      failed: 3
      declined: 4
      completed: 5

  money_flags:
    deposit_money_in_statuses:
      - completed
      - manual_reconciliation
    withdrawal_money_out_statuses:
      - completed
    pending_withdrawal_statuses:
      - initiated
      - pending

  bonus:
    ASSUMED_DEFAULT: UGX  # ASSUMED - bonustransactions has no currency field.
    allowed_transaction_types:
      - ALLOCATED
      - RELEASE
      - CONSUME
      - EXPIRED

  unjoined:
    sample_ids_per_class: 10
    known_orphan_wallet_ids:
      - "0751231231"
      - "0754321012"

  players:
    assumed_missing_is_deleted: false
    assumed_missing_archived: false

# Cloudflare CIDR ranges used to strip CDN edges from ip_address chains.
# NOTE (Phase 1): useractivitylogs.ip_address is a COMMA-SEPARATED STRING
# (e.g. "80.227.165.206, 162.159.122.165"), NOT an array as CLAUDE.md states.
# Client IP = first non-Cloudflare element after splitting on commas.
# Full official Cloudflare IPv4 list (https://www.cloudflare.com/ips-v4) so we
# don't misclassify edges; maintained here, used everywhere via ip_utils.
cloudflare_cidrs:
  - 173.245.48.0/20
  - 103.21.244.0/22
  - 103.22.200.0/22
  - 103.31.4.0/22
  - 141.101.64.0/18
  - 108.162.192.0/18
  - 190.93.240.0/20
  - 188.114.96.0/20
  - 197.234.240.0/22
  - 198.41.128.0/17
  - 162.158.0.0/15
  - 104.16.0.0/13
  - 104.24.0.0/14
  - 172.64.0.0/13
  - 131.0.72.0/22

# All detection thresholds live here, never inline. Every value below is a
# PLACEHOLDER — recalibrate on production data. None are used yet (Phase 4).
thresholds: {}

phase3:
  # Phase 3 feature work must read the frozen Phase 2 parquet contracts here,
  # not the mutable top-level data/*.parquet outputs rebuilt by Notebook 02.
  input_dir: data/snapshot_phase3_2026-06-19
